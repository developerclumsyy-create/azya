<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Азя</title>
  <style>
    :root {
      --bg1: #0b0d12;
      --bg2: #121720;
      --bg3: #1a202b;
      --card: rgba(20, 24, 32, 0.78);
      --card-border: rgba(255, 255, 255, 0.10);
      --text: #eef1f6;
      --muted: #b4bcc8;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --yes: #7f8cff;
      --no: #3d4656;
      --no-hover: #555f72;
    }* { box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  color: var(--text);
  background: #000;
}

body {
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 18% 20%, rgba(170, 185, 255, 0.12), transparent 18%),
    radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.08), transparent 14%),
    radial-gradient(circle at 50% 85%, rgba(120, 140, 210, 0.08), transparent 24%),
    linear-gradient(180deg, var(--bg1), var(--bg2) 55%, var(--bg3));
  background-size: 100% 100%;
}

.sky {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.8);
  box-shadow: 0 0 10px rgba(180, 195, 255, 0.65);
  opacity: 0.65;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { transform: scale(0.85); opacity: 0.35; }
  50% { transform: scale(1.35); opacity: 1; }
}

.card {
  position: relative;
  width: min(92vw, 460px);
  min-height: 360px;
  padding: 28px 24px 92px;
  border-radius: 28px;
  background: var(--card);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent 35%, rgba(255,255,255,0.04));
  pointer-events: none;
}

.title {
  margin: 0 0 12px;
  font-size: clamp(28px, 7vw, 44px);
  line-height: 1;
  letter-spacing: 0.02em;
}

.subtitle {
  margin: 0;
  min-height: 90px;
  font-size: clamp(16px, 3.8vw, 20px);
  line-height: 1.6;
  color: var(--text);
  white-space: pre-line;
}

.hint {
  margin-top: 12px;
  font-size: 12px;
  color: var(--muted);
  opacity: 0.85;
  min-height: 18px;
}

.buttons {
  position: absolute;
  left: 24px;
  right: 24px;
  bottom: 24px;
  height: 44px;
}

.btn {
  position: absolute;
  top: 0;
  border: 0;
  outline: 0;
  border-radius: 999px;
  padding: 12px 22px;
  font-weight: 700;
  font-size: 16px;
  color: #eef2ff;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  transition: transform 0.16s ease, background 0.16s ease, opacity 0.2s ease;
  user-select: none;
  touch-action: manipulation;
  min-width: 120px;
}

.btn:hover { transform: translateY(-1px); }

.yes {
  left: 0;
  background: linear-gradient(135deg, #7784ff, #5e6bf2);
}

.yes:hover {
  background: linear-gradient(135deg, #8a95ff, #6d79ff);
}

.no {
  right: 0;
  background: linear-gradient(135deg, #3d4656, #2b313d);
}

.no:hover {
  background: linear-gradient(135deg, #555f72, #3a4251);
}

.final {
  margin-top: 8px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  color: #d9def0;
}

.final.show {
  opacity: 1;
  transform: translateY(0);
}

.pulse {
  animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-1px); }
}

@media (max-width: 420px) {
  .card {
    min-height: 380px;
    padding: 24px 18px 86px;
  }

  .buttons {
    left: 18px;
    right: 18px;
  }

  .btn {
    min-width: 108px;
    padding-inline: 18px;
  }
}

  </style>
</head>
<body>
  <div class="sky" id="sky"></div>  <main class="card" id="card">
    <h1 class="title">Азя</h1>
    <p class="subtitle" id="mainText">Ты же сделаешь мне minet?</p>
    <p class="final" id="finalText"></p>
    <div class="hint" id="hintText">Нажми «Да» или попробуй поймать «Нет».</div><div class="buttons">
  <button class="btn yes pulse" id="yesBtn">Да</button>
  <button class="btn no" id="noBtn">Нет</button>
</div>

  </main>  <script>
    const sky = document.getElementById('sky');
    const card = document.getElementById('card');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const mainText = document.getElementById('mainText');
    const finalText = document.getElementById('finalText');
    const hintText = document.getElementById('hintText');

    let stage = 0;
    let fleeLock = false;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars(count = 70) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = `${rand(0, 100)}vw`;
        star.style.top = `${rand(0, 100)}vh`;
        star.style.animationDelay = `${rand(0, 4)}s`;
        star.style.width = `${rand(1, 2.6)}px`;
        star.style.height = star.style.width;
        star.style.opacity = `${rand(0.25, 0.9)}`;
        sky.appendChild(star);
      }
    }

    function fleeNo() {
      if (fleeLock) return;
      fleeLock = true;

      const cardRect = card.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = Math.max(0, cardRect.width - btnRect.width - 24);
      const maxY = Math.max(0, cardRect.height - btnRect.height - 110);

      const x = rand(0, maxX);
      const y = rand(0, maxY);

      noBtn.style.transition = 'transform 0.14s ease-out';
      noBtn.style.transform = `translate(${x - maxX}px, ${-(maxY - y)}px) rotate(${rand(-8, 8)}deg)`;

      setTimeout(() => { fleeLock = false; }, 140);
    }

    function lockButtonsForHalfSecond() {
      yesBtn.style.pointerEvents = 'none';
      noBtn.style.pointerEvents = 'none';
      setTimeout(() => {
        yesBtn.style.pointerEvents = 'auto';
        noBtn.style.pointerEvents = 'auto';
      }, 500);
    }

    yesBtn.addEventListener('click', () => {
      if (stage === 0) {
        mainText.textContent = '';
        finalText.textContent = 'Молодчинка!!';
        finalText.classList.add('show');
        hintText.textContent = '';
        lockButtonsForHalfSecond();

        setTimeout(() => {
          mainText.textContent = 'We are always together, right?';
          finalText.classList.remove('show');
          finalText.textContent = '';
          hintText.textContent = 'Последний раз — только «Да».';
          stage = 1;
        }, 1400);
      } else {
        mainText.textContent = '';
        finalText.textContent = 'You are the best friend, no cap. Always in my corner.';
        finalText.classList.add('show');
        hintText.textContent = '';
        yesBtn.disabled = true;
        noBtn.disabled = true;
        noBtn.style.pointerEvents = 'none';
      }
    });

    noBtn.addEventListener('mouseenter', fleeNo);
    noBtn.addEventListener('mousedown', fleeNo);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      fleeNo();
    }, { passive: false });

    createStars();
  </script></body>
</html>
