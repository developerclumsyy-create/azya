<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Азя</title>
  <style>
    :root {
      --bg1: #090b10;
      --bg2: #111622;
      --bg3: #1a2130;
      --card: rgba(16, 19, 26, 0.82);
      --card-border: rgba(255, 255, 255, 0.10);
      --text: #eef1f6;
      --muted: #aab3c2;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.52);
      --yes: #7281ff;
      --no: #3a4454;
      --no-hover: #505c70;
      --accent: #b6c1ff;
    }* { box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  color: var(--text);
  background: #000;
}

body {
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 18% 20%, rgba(170, 185, 255, 0.10), transparent 18%),
    radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.06), transparent 14%),
    radial-gradient(circle at 50% 85%, rgba(120, 140, 210, 0.08), transparent 24%),
    linear-gradient(180deg, var(--bg1), var(--bg2) 58%, var(--bg3));
}

.sky {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.8);
  box-shadow: 0 0 10px rgba(180, 195, 255, 0.65);
  opacity: 0.65;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { transform: scale(0.85); opacity: 0.35; }
  50% { transform: scale(1.35); opacity: 1; }
}

.card {
  position: relative;
  width: min(92vw, 480px);
  min-height: 380px;
  padding: 28px 24px 82px;
  border-radius: 28px;
  background: var(--card);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent 35%, rgba(255,255,255,0.04));
  pointer-events: none;
}

.title {
  margin: 0 0 12px;
  font-size: clamp(28px, 7vw, 44px);
  line-height: 1;
  letter-spacing: 0.02em;
  position: relative;
  z-index: 1;
}

.subtitle {
  margin: 0;
  min-height: 88px;
  font-size: clamp(16px, 3.8vw, 20px);
  line-height: 1.6;
  color: var(--text);
  white-space: pre-line;
  position: relative;
  z-index: 1;
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.final {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 30px;
  opacity: 0;
  transform: scale(0.98);
  transition: opacity 0.45s ease, transform 0.45s ease;
  pointer-events: none;
  z-index: 2;
  background: rgba(9, 11, 16, 0.08);
}

.final.show {
  opacity: 1;
  transform: scale(1);
}

.final h2 {
  margin: 0;
  font-size: clamp(44px, 12vw, 82px);
  line-height: 0.95;
  letter-spacing: 0.02em;
}

.final p {
  margin: 12px 0 0;
  font-size: clamp(15px, 3.6vw, 18px);
  color: var(--muted);
  line-height: 1.5;
}

.buttons {
  position: absolute;
  left: 24px;
  right: 24px;
  bottom: 54px;
  height: 44px;
  z-index: 3;
}

.btn {
  position: absolute;
  top: 0;
  border: 0;
  outline: 0;
  border-radius: 999px;
  padding: 12px 22px;
  font-weight: 700;
  font-size: 16px;
  color: #eef2ff;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  transition: transform 0.16s ease, background 0.16s ease, opacity 0.2s ease;
  user-select: none;
  touch-action: manipulation;
  min-width: 120px;
}

.btn:hover { transform: translateY(-1px); }

.yes {
  left: 0;
  background: linear-gradient(135deg, #7784ff, #5e6bf2);
}

.yes:hover {
  background: linear-gradient(135deg, #8a95ff, #6d79ff);
}

.no {
  right: 0;
  background: linear-gradient(135deg, #3d4656, #2b313d);
}

.no:hover {
  background: linear-gradient(135deg, #555f72, #3a4251);
}

@media (max-width: 420px) {
  .card {
    min-height: 390px;
    padding: 24px 18px 82px;
  }

  .buttons {
    left: 18px;
    right: 18px;
    bottom: 52px;
  }

  .btn {
    min-width: 108px;
    padding-inline: 18px;
  }

  .music-bar {
    left: 14px;
    right: 14px;
  }
}

  </style>
</head>
<body>
  <div class="sky" id="sky"></div>  <main class="card" id="card">
    <h1 class="title">Азя</h1>
    <p class="subtitle" id="mainText">Ты же сделаешь мне minet?</p><div class="final" id="finalOverlay">
  <div>
    <h2>Молодчинка!!</h2>
    <p>Все как надо.</p>
  </div>
</div>

<div class="buttons" id="buttons">
  <button class="btn yes" id="yesBtn">Да</button>
  <button class="btn no" id="noBtn">Нет</button>
</div>

  </main>  <script>
    const sky = document.getElementById('sky');
    const card = document.getElementById('card');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const mainText = document.getElementById('mainText');
    const finalOverlay = document.getElementById('finalOverlay');
    const buttons = document.getElementById('buttons');

    let stage = 0;
    let fleeLock = false;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars(count = 80) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = `${rand(0, 100)}vw`;
        star.style.top = `${rand(0, 100)}vh`;
        star.style.animationDelay = `${rand(0, 4)}s`;
        const size = `${rand(1, 2.6)}px`;
        star.style.width = size;
        star.style.height = size;
        star.style.opacity = `${rand(0.25, 0.9)}`;
        sky.appendChild(star);
      }
    }

    function fleeNo() {
      if (fleeLock || finalOverlay.classList.contains('show')) return;
      fleeLock = true;

      const cardRect = card.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = Math.max(0, cardRect.width - btnRect.width - 24);
      const maxY = Math.max(0, cardRect.height - btnRect.height - 150);

      const x = rand(0, maxX);
      const y = rand(0, maxY);

      noBtn.style.transition = 'transform 0.14s ease-out';
      noBtn.style.transform = `translate(${x - maxX}px, ${-(maxY - y)}px) rotate(${rand(-8, 8)}deg)`;

      setTimeout(() => { fleeLock = false; }, 140);
    }

    yesBtn.addEventListener('click', () => {
      if (stage === 0) {
        mainText.textContent = '';
        buttons.style.opacity = '0';
        buttons.style.pointerEvents = 'none';
        finalOverlay.classList.add('show');
        stage = 1;
      } else {
        mainText.textContent = '';
        buttons.style.opacity = '0';
        buttons.style.pointerEvents = 'none';
        finalOverlay.innerHTML = `
          <div>
            <h2>Молодчинка!!</h2>
            <p>Ты реально лучшая. Всё, конец сцены.</p>
          </div>
        `;
        finalOverlay.classList.add('show');
        yesBtn.disabled = true;
        noBtn.disabled = true;
      }
    });

    noBtn.addEventListener('mouseenter', fleeNo);
    noBtn.addEventListener('mousedown', fleeNo);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      fleeNo();
    }, { passive: false });

    createStars();
  </script></body>
</html>
